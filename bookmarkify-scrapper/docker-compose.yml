services:
  bookmarkify-scraper:
    image: bookmarkify-scraper:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # 服务监听端口（容器内固定 3000，对外端口由 ports 控制）
      PORT: 3000
      # Layer 1 reqwest HTTP 请求超时（秒）
      REQUEST_TIMEOUT_SECS: ${REQUEST_TIMEOUT_SECS:-10}
      # Layer 2 headless Chrome 渲染超时（秒）
      HEADLESS_TIMEOUT_SECS: ${HEADLESS_TIMEOUT_SECS:-30}
      # 缓存条目生存时间（秒）
      CACHE_TTL_SECS: ${CACHE_TTL_SECS:-3600}
      # 可选：HTTP 代理地址，例如 http://127.0.0.1:7890，留空则直连
      PROXY_URL: ${PROXY_URL:-}
      # 可选：阿里云 OSS 配置，五个变量须同时设置才生效
      OSS_ACCESS_KEY_ID: ${OSS_ACCESS_KEY_ID:-}
      OSS_ACCESS_KEY_SECRET: ${OSS_ACCESS_KEY_SECRET:-}
      OSS_BUCKET: ${OSS_BUCKET:-}
      OSS_ENDPOINT: ${OSS_ENDPOINT:-}
      OSS_BASE_URL: ${OSS_BASE_URL:-}
      # tracing 日志过滤级别（trace/debug/info/warn/error）
      RUST_LOG: ${RUST_LOG:-info}
    restart: unless-stopped
